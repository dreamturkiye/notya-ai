name: Setup Vercel Project (One-time)
on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy PRODUCTION (main branch)
        run: |
          git checkout main
          PROD_URL=$(vercel deploy --prod --yes \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --name=notya-ai 2>&1 | grep -E "^https" | tail -1)
          echo "Production: $PROD_URL"
          cat .vercel/project.json || echo "No project.json yet"

      - name: Get Project and Org IDs
        run: |
          cat .vercel/project.json
          echo "---"
          python3 -c "
import json
with open('.vercel/project.json') as f:
    d = json.load(f)
print('VERCEL_PROJECT_ID=' + d.get('projectId',''))
print('VERCEL_ORG_ID=' + d.get('orgId',''))
" || echo "Could not read project.json"

      - name: Deploy STAGING
        run: |
          git checkout staging
          vercel deploy --yes \
            --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -3

      - name: Deploy DEV
        run: |
          git checkout dev
          vercel deploy --yes \
            --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -3

      - name: Done
        run: |
          echo "All 3 environments deployed"
          echo "Check vercel.com/dashboard for URLs"
