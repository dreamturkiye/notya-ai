name: Get Vercel Project Info
on:
  workflow_dispatch:

jobs:
  info:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Link and get project info
        run: |
          vercel link --yes --token=${{ secrets.VERCEL_TOKEN }} 2>&1 || true
          
          echo "=== .vercel/project.json ==="
          cat .vercel/project.json 2>/dev/null || echo "NOT FOUND"
          
          echo ""
          echo "=== Vercel Projects List ==="
          curl -s -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            "https://api.vercel.com/v9/projects?limit=10" | python3 -c "
import json,sys
d=json.load(sys.stdin)
for p in d.get('projects',[]):
    print(f\"ID: {p['id']} | Name: {p['name']} | URL: {p.get('link',{}).get('deployHooks','N/A')}\")
" || echo "Could not list projects"
